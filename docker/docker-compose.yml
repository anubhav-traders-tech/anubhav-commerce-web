version: "3.8"

services:
  api:
    image: node:20
    volumes:
      - ..:/workspace
    working_dir: /workspace
    command: sleep infinity
    ports:
      - "3000:3000"
      - "3001:3001"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: commerce
    ports:
      - "5432:5432"
